<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>鬼屋调查：第一关</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section class="screen intro-screen active" id="introScreen">
    <div class="intro-overlay"></div>

    <div class="intro-card">
      <h1>Seen Her</h1>
      <p class="intro-subtitle">Cop 4580, welcome</p>

      <p>
        Please check out related document with assistant Yolanda
      </p>

      <button id="startGameBtn">Clear</button>
    </div>
  </section>

  <section class="screen game-screen" id="gameScreen">
    <header class="top-bar">
      <div>
        <h2>第一关：案发现场</h2>
        <p>点击房间中的关键区域，调查证据。</p>
      </div>

      <button id="backIntroBtn" class="secondary-btn">返回首页</button>
    </header>

    <main class="game-layout">
      <section class="scene-panel">
        <div class="scene-wrapper">
          <img
            id="roomImage"
            class="scene-image"
            src="images/room.png"
            alt="案发房间"
          />

          <button class="hotspot hs-photo" data-evidence="photo" aria-label="照片"></button>
          <button class="hotspot hs-mirror" data-evidence="mirror" aria-label="镜子"></button>
          <button class="hotspot hs-doll" data-evidence="doll" aria-label="娃娃"></button>
          <button class="hotspot hs-computer" data-evidence="computer" aria-label="电脑"></button>
          <button class="hotspot hs-camera" data-evidence="camera" aria-label="相机"></button>
          <button class="hotspot hs-polaroid" data-evidence="polaroid" aria-label="拍立得"></button>
        </div>
      </section>

      <aside class="side-panel">
        <div class="panel-block">
          <h3>当前叙事</h3>
          <div id="storyText" class="story-text">
            <p>你站在门口。先检查房间里那些被摆放、被观看、被隐藏起来的东西。</p>
          </div>
        </div>

        <div class="panel-block">
          <h3>证据栏</h3>
          <div class="evidence-icons" id="evidenceIcons"></div>
        </div>

        <div class="panel-block">
          <h3>调查进度</h3>
          <p id="progressCount">0 / 6</p>
        </div>
      </aside>
    </main>
  </section>

  <section class="screen game-screen" id="gameScreen2">
    <header class="top-bar">
      <div>
        <h2>第二关：镜中房间</h2>
        <p>这个房间与刚才相似，但一切都被反转了。</p>
      </div>

      <button id="backPage1Btn" class="secondary-btn">返回上一页</button>
    </header>

    <main class="game-layout">
      <section class="scene-panel">
        <div class="scene-wrapper">
          <img
            id="roomImage2"
            class="scene-image"
            src="images/room2.png"
            alt="镜中房间"
          />

          <button class="hotspot hs-photo-mirror" data-evidence="photoMirror" aria-label="第二页照片"></button>
        </div>
      </section>

      <aside class="side-panel">
        <div class="panel-block">
          <h3>当前叙事</h3>
          <div id="storyText2" class="story-text">
            <p>镜子另一侧的房间像是原房间的镜像。桌上仍压着一叠照片。</p>
          </div>
        </div>
      </aside>
    </main>
  </section>

  <div class="modal" id="evidenceModal">
    <div class="modal-card">
      <button id="closeModalBtn" class="modal-close">✕</button>

      <div class="modal-header">
        <div id="modalMark" class="modal-mark">🖼️</div>
        <div>
          <h3 id="modalTitle">证据标题</h3>
          <p id="modalSubtitle">证据副标题</p>
        </div>
      </div>

      <div class="modal-content">
        <div id="artifactView" class="artifact-view"></div>
        <div id="artifactNote" class="artifact-note"></div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>

  <div id="scaffoldNav" class="scaffold-nav">
  <button id="goIntroBtn" type="button">Intro</button>
  <button id="goRoom1Btn" type="button">Room 1</button>
  <button id="goRoom2Btn" type="button">Room 2</button>
</div>
</body>
</html>
